<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <title>Calculator</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <label id="numberResult">0</label>
    <div> </div>
    <button onclick="inputPlus()">Plus +</button>
    <button onclick="inputSub()">Minus -</button>
    <button onclick="inputDiv()">Multiply *</button>
    <button onclick="inputMult()">Divided /</button>
    <div> </div>
    <button class="numeros" id="number1" value="1">1</button>
    <button class="numeros" id="number2" value="2">2</button>
    <button class="numeros" id="number3" value="3">3</button>
    <div> </div>
    <button class="numeros" id="number4" value="4">4</button>
    <button class="numeros" id="number5" value="5">5</button>
    <button class="numeros" id="number6" value="6">6</button>
    <div> </div>
    <button class="numeros" id="number7" value="7">7</button>
    <button class="numeros" id="number8" value="8">8</button>
    <button class="numeros" id="number9" value="9">9</button>
    <div> </div>
    <button class="numeros" id="number." value=".">.</button>
    <button class="numeros" id="number0" value="0">0</button>
    <button class="numeros" id="equal" onclick="displayResult()">=</button>

  
    <script src="script.js"></script>
  </body>
</html>
